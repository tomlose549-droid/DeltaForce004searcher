<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的第一个网页</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #333;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 100px auto;
      padding: 20px;
    }

    h1 {
      color: #2c7be5;
      font-size: 42px;
    }

    p {
      font-size: 20px;
      line-height: 1.8;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #2c7be5;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    .btn:hover {
      background: #1a5fc4;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>欢迎来到我的网页</h1>
    <p>这是我在 GitHub 上创建的第一个网页。</p>
    <p>以后我可以继续添加图片、简介、联系方式和更多内容。</p>
    <a class="btn" href="#">了解更多</a>
  </div>
</body>
</html>
